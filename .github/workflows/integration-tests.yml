name: Tests d'intégration

on:
  push:
  pull_request:
  workflow_dispatch:       # trigger manuel depuis GitHub Actions

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          # Integration tests instantiate a real @supabase/supabase-js
          # client (helpers.ts's adminClient()), which pulls in
          # @supabase/realtime-js's RealtimeClient — that requires a
          # native global WebSocket, unflagged only from Node 22
          # onward. Node 20 (still used by ci.yml/daily-rapport.yml,
          # which never construct a real client — they mock
          # supabase.rpc entirely) fails at import time with
          # "Node.js 20 detected without native WebSocket support."
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - name: Start local Supabase (Postgres + Auth + PostgREST)
        run: supabase start

      - name: Apply db/schema.sql + all db/migration_v*.sql
        run: node scripts/test-db-setup.js

      - name: Run integration tests (real submit_sale/cancel_sale/join_business RPCs)
        run: npm run test:integration
