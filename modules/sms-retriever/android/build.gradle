plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.smsretriever'
version = '1.0.0'

// expo-module-gradle-plugin injects compileSdk/minSdk/targetSdk (and Kotlin
// support) from the root project — the modern SDK 54 pattern used by every
// bundled Expo module (see node_modules/expo-local-authentication). The old
// `applyKotlinExpoModulesCorePlugin()` approach this module previously used no
// longer sets compileSdk, and SDK 54's AGP makes compileSdk mandatory with no
// fallback, so the Android build failed with:
//   "project ':sms-retriever' does not specify `compileSdk`"
android {
  namespace "expo.modules.smsretriever"

  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }

  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'com.google.android.gms:play-services-auth:21.2.0'
}
